<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Exception Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- SECTION 1: Header -->
        <header class="app-header">
            <h1>Delivery Exception Management Dashboard</h1>
            <p>Internal Operations Tool – GreyAtom Logistics</p>
        </header>

        <!-- SECTION 2: Form -->
        <section class="card">
            <div class="card-header">
                <h2>Log Delivery Exception</h2>
            </div>
            <form id="exception-form" novalidate>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="delivery-id">Delivery ID <span class="required">*</span></label>
                        <input type="text" id="delivery-id" required placeholder="e.g. DLV-98213">
                    </div>
                    <div class="form-group">
                        <label for="customer-name">Customer Name <span class="required">*</span></label>
                        <input type="text" id="customer-name" required placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label for="issue-type">Issue Type <span class="required">*</span></label>
                        <select id="issue-type" required>
                            <option value="" disabled selected>Select an issue...</option>
                            <option value="Address Not Found">Address Not Found</option>
                            <option value="Customer Not Available">Customer Not Available</option>
                            <option value="Payment Issue">Payment Issue</option>
                            <option value="Package Damaged">Package Damaged</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority <span class="required">*</span></label>
                        <div class="radio-group" id="priority-group">
                            <label class="radio-label"><input type="radio" name="priority" value="Low" required> Low</label>
                            <label class="radio-label"><input type="radio" name="priority" value="Medium"> Medium</label>
                            <label class="radio-label"><input type="radio" name="priority" value="High"> High</label>
                        </div>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.5rem;">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="3" placeholder="Optional details regarding the exception..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Submit Exception</button>
                </div>
            </form>
        </section>

        <!-- DASHBOARD SECTION -->
        <section class="card">
            <div class="card-header">
                <h2>Exceptions Dashboard</h2>
            </div>
            
            <div class="dashboard-top">
                <!-- SECTION 3: Filters -->
                <div class="filters">
                    <div class="filter-group">
                        <label for="filter-issue">Filter by Issue:</label>
                        <select id="filter-issue">
                            <option value="All">All Issues</option>
                            <option value="Address Not Found">Address Not Found</option>
                            <option value="Customer Not Available">Customer Not Available</option>
                            <option value="Payment Issue">Payment Issue</option>
                            <option value="Package Damaged">Package Damaged</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-status">Filter by Status:</label>
                        <select id="filter-status">
                            <option value="All">All Statuses</option>
                            <option value="Open">Open</option>
                            <option value="Resolved">Resolved</option>
                        </select>
                    </div>
                </div>

                <!-- BONUS: Stats -->
                <div class="stats">
                    <div class="stat-box open">
                        <span class="stat-label">Total Open</span>
                        <span class="stat-value" id="count-open">0</span>
                    </div>
                    <div class="stat-box resolved">
                        <span class="stat-label">Total Resolved</span>
                        <span class="stat-value" id="count-resolved">0</span>
                    </div>
                </div>
            </div>

            <!-- SECTION 4: Table -->
            <div class="table-wrapper">
                <table id="exceptions-table">
                    <thead>
                        <tr>
                            <th>Delivery ID</th>
                            <th>Customer Name</th>
                            <th>Issue Type</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Dynamic rows will be inserted here -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state hidden">
                    No exceptions match your criteria.
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
